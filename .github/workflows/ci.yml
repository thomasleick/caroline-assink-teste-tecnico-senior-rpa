name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  GCR_PROJECT_ID: ${{ secrets.GCR_PROJECT_ID }}
  IMAGE_API: gcr.io/${{ secrets.GCR_PROJECT_ID }}/rpa-api
  IMAGE_WORKER: gcr.io/${{ secrets.GCR_PROJECT_ID }}/rpa-worker

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install poetry
          poetry install --no-root

      - name: Run Ruff (lint)
        run: poetry run ruff check .

      - name: Run Black (format check)
        run: poetry run black --check .

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install poetry
          poetry install --no-root

      - name: Run unit tests
        run: |
          poetry run pytest tests/unit/ -v --cov=. --cov-report=xml

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
        continue-on-error: true

  integration-tests:
    name: Integration Tests (Testcontainers)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install poetry
          poetry install --no-root

      - name: Run integration tests
        run: |
          poetry run pytest tests/integration/ -v

  build-push-deploy:
    name: Build, Push and Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: integration-tests
    env:
      REGION: southamerica-east1
      PROJECT_ID: ${{ secrets.GCR_PROJECT_ID }}
      REPOSITORY: docker-repo
      IMAGE_API: southamerica-east1-docker.pkg.dev/${{ secrets.GCR_PROJECT_ID }}/docker-repo/api
      IMAGE_WORKER: southamerica-east1-docker.pkg.dev/${{ secrets.GCR_PROJECT_ID }}/docker-repo/worker
    # Only push on commits to main/master, not on PRs
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCR_SA_KEY }}

      - name: Configure Docker to use gcloud credentials
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build API image
        run: |
          docker build -f Dockerfile.api -t $IMAGE_API:latest -t $IMAGE_API:${{ github.sha }} .

      - name: Build Worker image
        run: |
          docker build -f Dockerfile.worker -t $IMAGE_WORKER:latest -t $IMAGE_WORKER:${{ github.sha }} .

      - name: Push API image
        run: |
          docker push $IMAGE_API:latest
          docker push $IMAGE_API:${{ github.sha }}

      - name: Push Worker image
        run: |
          docker push $IMAGE_WORKER:latest
          docker push $IMAGE_WORKER:${{ github.sha }}
      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy api \
            --image $IMAGE_API:${{ github.sha }} \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --project $PROJECT_ID

      - name: Deploy Worker as Private Service
        run: |
          gcloud run deploy worker \
            --image $IMAGE_WORKER:${{ github.sha }} \
            --region $REGION \
            --platform managed \
            --no-allow-unauthenticated \
            --min-instances 1 \
            --no-cpu-throttling \
            --concurrency 1 \
            --project $PROJECT_ID
